name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run release:check
      - run: npm run app:build
      - run: npm test
        env:
          PARADIGM_MEMORY_AUTOWARM: '0'

  cli:
    name: cli (${{ matrix.asset_platform }}-${{ matrix.asset_arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_platform: windows
            asset_arch: x64
          - runner: ubuntu-22.04
            asset_platform: linux
            asset_arch: x64
          - runner: macos-26
            asset_platform: macos
            asset_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm prune --omit=dev
      - name: Build CLI release tree
        run: node scripts/build-cli-release.mjs --platform ${{ matrix.asset_platform }} --arch ${{ matrix.asset_arch }}
      - name: Archive CLI release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          name="paradigm-memory-cli-v${version}-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}"
          tar -czf "dist/release/${name}.tar.gz" -C "dist/release/${name}" .
      - uses: actions/upload-artifact@v4
        with:
          name: paradigm-memory-cli-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}
          path: dist/release/*.tar.gz

  app:
    name: app (${{ matrix.asset_platform }}-${{ matrix.asset_arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_platform: windows
            asset_arch: x64
          - runner: macos-26
            asset_platform: macos
            asset_arch: arm64
          - runner: ubuntu-22.04
            asset_platform: linux
            asset_arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Linux dependencies
        if: matrix.asset_platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build Paradigm Memory
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/memory
          includeUpdaterJson: false
      - name: Package portable desktop launcher
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          out="dist/release"
          mkdir -p "$out"
          name="paradigm-memory-desktop-v${version}-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}"
          case "${{ matrix.asset_platform }}" in
            windows)
              desktop_tmp="$out/${name}"
              rm -rf "$desktop_tmp"
              mkdir -p "$desktop_tmp"
              cp "./packages/memory/src-tauri/target/release/paradigm-memory.exe" "$desktop_tmp/"
              webview2="$(find packages/memory/src-tauri/target/release -name WebView2Loader.dll -print -quit)"
              if [ -n "$webview2" ]; then
                cp "$webview2" "$desktop_tmp/"
              fi
              (cd "$desktop_tmp" && 7z a "../${name}.zip" .)
              ;;
            macos)
              app_path="$(find packages/memory/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
              test -n "$app_path"
              ditto -c -k --sequesterRsrc --keepParent "$app_path" "$out/${name}.zip"
              ;;
            linux)
              appimage="$(find packages/memory/src-tauri/target/release/bundle -name '*.AppImage' -print -quit)"
              test -n "$appimage"
              cp "$appimage" "$out/${name}.AppImage"
              chmod +x "$out/${name}.AppImage"
              ;;
          esac
      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: paradigm-memory-app-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}
          if-no-files-found: error
          path: |
            dist/release/paradigm-memory-desktop-*
            packages/memory/src-tauri/target/release/bundle/**/*.msi
            packages/memory/src-tauri/target/release/bundle/**/*.exe
            packages/memory/src-tauri/target/release/bundle/**/*.dmg
            packages/memory/src-tauri/target/release/bundle/**/*.deb
            packages/memory/src-tauri/target/release/bundle/**/*.rpm
            packages/memory/src-tauri/target/release/bundle/**/*.AppImage

  publish:
    name: publish release
    needs: [cli, app]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: paradigm-memory-*
          merge-multiple: true
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          while IFS= read -r -d '' file; do
            cp "$file" "upload/$(basename "$file")"
          done < <(find artifacts -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.AppImage' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) -print0)
          find upload -maxdepth 1 -type f -print
          test -n "$(find upload -maxdepth 1 -type f -print -quit)"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: upload/*
          fail_on_unmatched_files: true
