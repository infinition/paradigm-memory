name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run release:check
      - run: npm run app:build
      - run: npm test
        env:
          PARADIGM_MEMORY_AUTOWARM: '0'

  cli:
    name: cli (${{ matrix.asset_platform }}-${{ matrix.asset_arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_platform: windows
            asset_arch: x64
          - runner: ubuntu-22.04
            asset_platform: linux
            asset_arch: x64
          - runner: macos-13
            asset_platform: macos
            asset_arch: x64
          - runner: macos-14
            asset_platform: macos
            asset_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm prune --omit=dev
      - name: Build CLI release tree
        run: node scripts/build-cli-release.mjs --platform ${{ matrix.asset_platform }} --arch ${{ matrix.asset_arch }}
      - name: Archive CLI release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          name="paradigm-memory-cli-v${version}-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}"
          tar -czf "dist/release/${name}.tar.gz" -C "dist/release/${name}" .
      - uses: actions/upload-artifact@v4
        with:
          name: paradigm-memory-cli-${{ matrix.asset_platform }}-${{ matrix.asset_arch }}
          path: dist/release/*.tar.gz

  app:
    name: app (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build Paradigm Memory
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/memory
          includeUpdaterJson: false

  publish:
    name: publish release
    needs: [cli, app]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: paradigm-memory-cli-*
          merge-multiple: true
      - name: Upload CLI assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
