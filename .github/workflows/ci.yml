name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm test
        env:
          PARADIGM_MEMORY_AUTOWARM: '0'
      - run: npm run test:coverage
        if: matrix.os == 'ubuntu-latest'
        env:
          PARADIGM_MEMORY_AUTOWARM: '0'

  eval:
    name: eval (lexical baseline)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run eval:memory
        env:
          PARADIGM_MEMORY_EMBEDDINGS: 'off'
          PARADIGM_MEMORY_AUTOWARM: '0'
      - uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/*.md
