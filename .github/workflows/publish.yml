name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm test
        env:
          PARADIGM_MEMORY_AUTOWARM: '0'
      - run: npm run release:check
      - name: Publish to NPM
        run: |
          npm publish --workspace @paradigm-memory/memory-core --provenance --access public
          npm publish --workspace @paradigm-memory/memory-mcp --provenance --access public
          npm publish --workspace @paradigm-memory/memory-cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
